<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot - Supyourself</title>
    <meta name="author" content="Supyourself">
    
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

    <style>
      * {
        box-sizing: border-box;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Georgia', 'Times New Roman', serif; /* Stile classico romano */
        overflow: hidden; /* Niente barre di scorrimento esterne */
      }

      /* Sfondo Lorica Segmentata (Armatura Romana) */
      body {
        background: linear-gradient(135deg, #4A5054 0%, #8A95A5 50%, #4A5054 100%) !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }

      /* Struttura Centrale */
      main {
        width: 95%;
        max-width: 900px;
        height: 90vh; /* Occupa il 90% dell'altezza dello schermo */
        display: flex;
        flex-direction: column;
      }

      /* Contenitore della Chat */
      .chatbot {
        background-color: #F9F6EE !important; /* Bianco Marmo Travertino */
        border: 4px solid #D4AF37 !important; /* Oro Romano */
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Intestazione */
      .chat-header {
        background-color: #800020 !important; /* Porpora Imperiale */
        padding: 20px;
        text-align: center;
        border-bottom: 3px solid #D4AF37 !important;
      }

      .chat-header h1 {
        color: #D4AF37 !important;
        margin: 0;
        font-size: 32px;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      .header-sub-text {
        background-color: #F9F6EE;
        text-align: center;
        padding: 10px;
        border-bottom: 2px solid #D4AF37;
      }

      .header-sub-text p {
        color: #4A5054;
        margin: 0;
        font-size: 14px;
        font-style: italic;
      }

      .header-sub-text a.purple {
        color: #800020;
        font-weight: bold;
      }

      /* Finestra dei messaggi scorrevole */
      #messages-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        background-color: #F9F6EE; /* Marmo */
        display: flex;
        flex-direction: column;
      }

      /* STILE DEI FUMETTI DELLA CHAT */
      .message {
        margin-bottom: 20px;
        display: flex;
        align-items: flex-start;
      }
      
      .message img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        margin-right: 15px;
        border: 2px solid #D4AF37;
        background-color: white;
      }
      
      .message p {
        padding: 12px 18px;
        border-radius: 8px;
        margin: 0;
        max-width: 80%;
        font-size: 16px;
        line-height: 1.4;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }

      /* Messaggio dell'Utente (Oro) */
      .message.user p {
        background-color: #D4AF37;
        color: #800020;
        border-bottom-left-radius: 0;
        font-weight: bold;
      }

      /* Messaggio del Bot (Porpora) */
      .message.aibot p {
        background-color: #800020;
        color: #F9F6EE;
        border-bottom-left-radius: 0;
      }
      
      /* Messaggio di Errore */
      .message.error p {
        background-color: #4A5054;
        color: #D4AF37;
        border: 2px solid red;
      }

      /* Casella di Testo per Scrivere */
      #message-form {
        display: flex;
        padding: 15px;
        background-color: #F9F6EE;
        border-top: 3px solid #D4AF37;
      }

      #message-input {
        flex-grow: 1;
        padding: 15px;
        border: 2px solid #8A95A5;
        border-radius: 6px;
        font-size: 16px;
        background-color: white;
        font-family: inherit;
        resize: none;
        height: 55px;
      }

      #message-input:focus {
        outline: none;
        border-color: #800020;
        box-shadow: 0 0 5px #800020;
      }

      /* Bottone Invio */
      #message-form button {
        background-color: #800020;
        color: #D4AF37;
        border: 2px solid #D4AF37;
        border-radius: 6px;
        margin-left: 15px;
        padding: 0 30px;
        font-size: 24px;
        cursor: pointer;
        transition: 0.3s;
      }

      #message-form button:hover {
        background-color: #D4AF37;
        color: #800020;
      }

      /* Animazione di caricamento */
      .loading-animation {
        width: 30px;
        height: 30px;
        border: 4px solid #D4AF37;
        border-top: 4px solid #800020;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 10px auto;
      }
      .loading-text {
        text-align: center;
        color: #800020;
        font-weight: bold;
        font-style: italic;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  
  <body>
    <main>  
      <div class="chatbot">
        
        <div class="chat-header">
          <h1>My LLM</h1>
        </div>
        <div class="header-sub-text">
          <p>Copyright © 2026 - Created by Supyourself, financed by Naspi <a class="purple">❤</a></p>
        </div>

        <div id="messages-container"></div>
        
        <form id="message-form">
          <textarea id="message-input" placeholder="Scrivi un messaggio al tuo oracolo..."></textarea>
          <button type="submit">➤</button> 
        </form>
        
      </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
